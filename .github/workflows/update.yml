name: 每日更新ETF持股

on:
  schedule:
    - cron: '0 10 * * 1-5'   # UTC 10:00 = 台北 18:00，週一至週五
  workflow_dispatch:           # 允許手動觸發
    inputs:
      tg_period:
        description: '比較天數 (1/3/5)'
        default: '1'
      tg_min_count:
        description: '樣板A 最少家數'
        default: '3'
      tg_send_a:
        description: '推播樣板A (true/false)'
        default: 'true'
      tg_send_b:
        description: '推播樣板B (true/false)'
        default: 'true'
      tg_etfs_b:
        description: '樣板B 追蹤ETF (逗號分隔)'
        default: '00981A,00982A,00991A,00990A,00992A,00993A,00988A,00980A,00985A,00995A,00984A,00983A,00987A,00989A,00999A'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      TG_PERIOD:          ${{ github.event.inputs.tg_period || '1' }}
      TG_MIN_COUNT:       ${{ github.event.inputs.tg_min_count || '3' }}
      TG_SEND_A:          ${{ github.event.inputs.tg_send_a || 'true' }}
      TG_SEND_B:          ${{ github.event.inputs.tg_send_b || 'true' }}
      TG_ETFS_B:          ${{ github.event.inputs.tg_etfs_b || '00981A,00982A,00991A,00990A,00992A,00993A,00988A,00980A,00985A,00995A,00984A,00983A,00987A,00989A,00999A' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch ETF holdings
        run: python fetch_data.py

      - name: Commit and push data
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "data: 更新持股快照 $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')"
          git push
